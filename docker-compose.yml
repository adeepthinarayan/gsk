version: "3.8"

services:
  app:
    build: ./app
    container_name: python_app
    env_file: .env
    ports:
      - "5000:5000"
    depends_on:
      - db
    networks:
      - mynetwork

  db:
    image: postgres:15-alpine
    container_name: postgres_db
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - mynetwork

volumes:
  pgdata:

networks:
  mynetwork:
